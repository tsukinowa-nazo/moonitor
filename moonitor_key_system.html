<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カラーパネル・キーシステム</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 隠しリセットエリア（右下） */
        #reset-zone { position: absolute; bottom: 0; right: 0; width: 150px; height: 150px; z-index: 100; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            background: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
        }

        #lock-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            z-index: 200;
            color: white;
            font-weight: bold;
            text-align: center;
            padding-top: 180px;
            box-sizing: border-box;
            font-size: 1.4rem;
        }

        /* 共通モーダル設定 */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
            z-index: 300;
            text-align: center;
        }

        #confirm-modal { width: 340px; }
        #hint-modal { width: 480px; }

        .warning-svg {
            width: 100px;
            height: 90px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        #color-preview {
            width: 45px;
            height: 45px;
            margin: 0 auto 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
            display: inline-block;
            vertical-align: middle;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
        }

        .modal-btn {
            padding: 15px 35px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-yes { background: #ff4444; color: white; }
        .btn-no { background: #ccc; color: #333; }
        .btn-close { background: #444; color: white; margin-top: 10px; width: 60%; }

        .cell {
            width: 100px; height: 100px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            transition: transform 0.05s;
            position: relative;
            overflow: hidden;
        }
        .cell:active { transform: scale(0.92); }

        .cell-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2rem;
            user-select: none;
            pointer-events: none;
        }

        #message-area {
            margin-top: 40px; padding: 25px;
            width: 90%; max-width: 500px; min-height: 100px;
            background: white; border: 2px solid #ddd; border-radius: 20px;
            text-align: center; font-size: 1.3rem; font-weight: bold;
            color: #333; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="reset-zone"></div>

    <div id="confirm-modal" class="modal">
        <svg class="warning-svg" id="warning-icon" viewBox="0 0 100 100">
            <rect x="12" y="12" width="76" height="76" rx="8" ry="8" fill="#FFD700" stroke="#000" stroke-width="8"/>
            <text x="50" y="69" font-family="Arial" font-size="50" font-weight="bold" text-anchor="middle" fill="#000">!</text>
        </svg>
        <div>
            <div id="color-preview"></div> 
            <span style="font-size: 1.2rem; display: block; margin-bottom: 5px;">本当にこの色でよろしいですか？</span>
        </div>
        <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">間違っている場合一定時間操作不可になります</p>
        <div class="btn-container">
            <button class="modal-btn btn-yes" id="btn-yes">はい</button>
            <button class="modal-btn btn-no" id="btn-no">いいえ</button>
        </div>
    </div>

    <div id="hint-modal" class="modal">
        <p id="hint-text" style="font-size: 1.4rem; font-weight: bold; margin: 30px 0; white-space: nowrap;">鍵の解除方法</p>
        <p style="font-size: 1.2rem; margin: 10px 0;">戸に向かって「クリア」と叫ぶ</p>
        <button class="modal-btn btn-close" id="btn-hint-close">閉じる</button>
    </div>

    <div class="grid" id="colorGrid">
        <div id="lock-overlay">再試行まで<br><span id="timer">準備中...</span></div>
    </div>
    <div id="message-area">
        <div id="text-content">パネルを押してください</div>
    </div>

    <script>
        const penaltyTimes = [10, 30, 60, 600, 1800];
        let errorCount = 0;
        let isLocked = false;
        let resetClickCount = 0;
        let timerId = null;
        let selectedColor = null;
        let seenMessages = new Set();

        const colors = [
            { name: "Lime",    code: "#00FF00" },
            { name: "Gray",  code: "#808080" },
            { name: "White",   code: "#FFFFFF" }, 
            { name: "Aqua",    code: "#00FFFF" },
            { name: "Blue",    code: "#0000FF", msg: "鍵の解除方法：\n全員で「オープン」と叫ぶ" }, 
            { name: "Purple",  code: "#8A2BE2" },
            { name: "Green",  code: "#008000" },
            { name: "Magenta", code: "#FF00FF" },
            { name: "Red",     code: "#FF0000", msg: "鍵の解除方法：\n研究員に「くらげ」と伝える" }
        ];

        const grid = document.getElementById('colorGrid');
        const textContent = document.getElementById('text-content');
        const lockOverlay = document.getElementById('lock-overlay');
        const timerDisplay = document.getElementById('timer');
        const confirmModal = document.getElementById('confirm-modal');
        const hintModal = document.getElementById('hint-modal');
        const preview = document.getElementById('color-preview');
        const warningIcon = document.getElementById('warning-icon');

        function getTextColorForBg(hex) {
            const c = (hex || '').replace('#','');
            if (c.length !== 6) return '#fff';
            const r = parseInt(c.substring(0,2),16);
            const g = parseInt(c.substring(2,4),16);
            const b = parseInt(c.substring(4,6),16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? '#000' : '#fff';
        }

        colors.forEach((color, idx) => {
            const div = document.createElement('div');
            div.className = 'cell';
            div.style.backgroundColor = color.code;
            if(color.code === "#FFFFFF" || color.code === "#FFE4CD") div.style.borderColor = "#bbb";

            const label = document.createElement('span');
            label.className = 'cell-label';
            label.innerText = String(idx + 1);
            label.style.color = getTextColorForBg(color.code);
            div.appendChild(label);

            div.onclick = (e) => {
                if (isLocked) return;
                e.stopPropagation();
                resetClickCount = 0;
                selectedColor = color;
                preview.style.backgroundColor = color.code;
                confirmModal.style.display = "block";
            };
            grid.appendChild(div);
        });

        document.getElementById('btn-yes').onclick = () => {
            confirmModal.style.display = "none";
            if (selectedColor.msg) {
                seenMessages.add(selectedColor.name);
                textContent.innerText = selectedColor.msg;
            } else {
                startPenalty();
            }
        };

        document.getElementById('btn-no').onclick = () => {
            confirmModal.style.display = "none";
            textContent.innerText = "パネルを押してください";
        };

        warningIcon.onclick = () => {
            if (seenMessages.has("Blue") && seenMessages.has("Red")) {
                confirmModal.style.display = "none"; 
                hintModal.style.display = "block";
            }
        };

        document.getElementById('btn-hint-close').onclick = () => {
            hintModal.style.display = "none";
            textContent.innerText = "パネルを押してください";
        };

        function startPenalty() {
            isLocked = true;
            lockOverlay.style.display = "block";
            textContent.innerText = "操作不能";
            let timeLeft = penaltyTimes[Math.min(errorCount, penaltyTimes.length - 1)];
            errorCount++;

            const updateDisplay = (time) => {
                const minutes = Math.floor(time / 60);
                const seconds = time % 60;
                timerDisplay.innerText = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
            };

            updateDisplay(timeLeft);

            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    isLocked = false;
                    lockOverlay.style.display = "none";
                    textContent.innerText = "パネルを押してください";
                } else {
                    updateDisplay(timeLeft);
                }
            }, 1000);
        }

        document.getElementById('reset-zone').onclick = () => {
            resetClickCount++;
            if (resetClickCount === 3) {
                if (confirm("resetしますか？")) {
                    if (timerId) clearInterval(timerId);
                    textContent.innerText = "パネルを押してください";
                    errorCount = 0; resetClickCount = 0; isLocked = false;
                    seenMessages.clear();
                    lockOverlay.style.display = "none";
                    confirmModal.style.display = "none";
                    hintModal.style.display = "none";
                } else {
                    resetClickCount = 0;
                }
            }
        };
    </script>
</body>
</html>
